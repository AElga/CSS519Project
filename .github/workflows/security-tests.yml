name: Security Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'Project/package-lock.json'

      - name: Install dependencies
        run: |
          cd Project
          npm ci --build-from-source

      - name: Seed database
        run: |
          cd Project
          npm run seed

      - name: Run security tests
        run: |
          cd Project
          npm run security_test

      - name: Run Prometheus rule tests
        run: |
          npm run prometheus_rule_test

      - name: Run dashboard configuration tests
        run: |
          npm run dashboard_config_test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: Project/test-results/
