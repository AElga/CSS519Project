groups:
  - name: elghealth_recording_rules
    interval: 30s
    rules:
      - record: elghealth:http_requests:rate5m
        expr: sum by (route, method, status) (rate(elghealth_http_requests_total[5m]))

      - record: elghealth:http_request_errors:rate5m
        expr: sum by (route, method) (rate(elghealth_http_requests_total{status=~"5.."}[5m]))

      - record: elghealth:http_request_failures:rate5m
        expr: sum by (route, method, status) (rate(elghealth_http_requests_total{status=~"4..|5.."}[5m]))

      - record: elghealth:http_request_latency:p95_5m
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, route, method) (
              rate(elghealth_http_request_duration_seconds_bucket[5m])
            )
          )

      - record: elghealth:login_attempts:rate5m
        expr: sum by (outcome) (rate(elghealth_login_attempts_total[5m]))

      - record: elghealth:appointments_created:increase15m
        expr: increase(elghealth_appointments_created_total[15m])

      - record: elghealth:container_cpu:rate5m
        expr: sum by (container_label_com_docker_compose_service) (rate(container_cpu_usage_seconds_total{container_label_com_docker_compose_service!=""}[5m]))

      - record: elghealth:container_memory_bytes
        expr: sum by (container_label_com_docker_compose_service) (container_memory_usage_bytes{container_label_com_docker_compose_service!=""})

  - name: elghealth_alert_rules
    interval: 30s
    rules:
      - alert: ElgHealthBackendDown
        expr: up{job="elghealth-backend"} == 0
        for: 10s
        labels:
          severity: critical
          service: backend
        annotations:
          summary: ElgHealth backend is down
          description: Prometheus has been unable to scrape the ElgHealth backend metrics endpoint for more than 10 seconds.

      - alert: ElgHealthHighApiLatency
        expr: elghealth:http_request_latency:p95_5m{route!="/metrics"} > 0.75
        for: 5m
        labels:
          severity: warning
          service: backend
          category: performance
        annotations:
          summary: ElgHealth API latency is elevated
          description: The p95 latency for route {{ $labels.route }} {{ $labels.method }} has been above 750ms for 5 minutes.

      - alert: ElgHealthApiErrorsHigh
        expr: |
          (
            sum(rate(elghealth_http_requests_total{status=~"5.."}[5m]))
            /
            clamp_min(sum(rate(elghealth_http_requests_total[5m])), 0.001)
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: ElgHealth API error ratio is elevated
          description: More than 5% of API responses have been 5xx for 5 minutes.

      - alert: ElgHealthLoginFailuresElevated
        expr: |
          (
            sum(rate(elghealth_login_attempts_total{outcome=~"invalid_password|user_not_found"}[5m]))
            /
            clamp_min(sum(rate(elghealth_login_attempts_total[5m])), 0.001)
          ) > 0.5
          and
          sum(rate(elghealth_login_attempts_total[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
          service: auth
          category: security
        annotations:
          summary: ElgHealth login failures are elevated
          description: More than half of login attempts have failed for 10 minutes, which may indicate an auth issue or abuse.

      - alert: ElgHealthMemoryUsageHigh
        expr: elghealth_process_resident_memory_bytes > 250000000
        for: 10m
        labels:
          severity: warning
          service: backend
          category: performance
        annotations:
          summary: ElgHealth backend memory usage is high
          description: The backend process has used more than 250 MB of resident memory for 10 minutes.

      - alert: ElgHealthFrontendDown
        expr: probe_success{instance="http://frontend/health"} == 0
        for: 10s
        labels:
          severity: critical
          service: frontend
        annotations:
          summary: ElgHealth frontend is down
          description: The frontend health endpoint has failed blackbox probes for more than 10 seconds.

      - alert: ElgHealthContainerCpuHigh
        expr: sum(rate(container_cpu_usage_seconds_total{container_label_com_docker_compose_service="backend"}[5m])) > 0.75
        for: 10m
        labels:
          severity: warning
          service: backend
          category: performance
        annotations:
          summary: ElgHealth backend container CPU is high
          description: Backend container CPU usage has exceeded 0.75 CPU-seconds per second for 10 minutes.
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 10s
        labels:
          severity: critical
          service: prometheus
        annotations:
          summary: Prometheus is down
          description: Prometheus scrape target is down and not responding to scrapes for more than 10 seconds.

      - alert: GrafanaDown
        expr: probe_success{instance="http://grafana:3000/"} == 0
        for: 10s
        labels:
          severity: critical
          service: grafana
        annotations:
          summary: Grafana is down
          description: Grafana HTTP health probe has failed for more than 10 seconds.

      - alert: UptimeKumaDown
        expr: probe_success{instance="http://uptime-kuma:3001/"} == 0
        for: 10s
        labels:
          severity: critical
          service: uptime-kuma
        annotations:
          summary: Uptime Kuma is down
          description: Uptime Kuma HTTP probe has failed for more than 10 seconds.

      - alert: CadvisorDown
        expr: up{job="cadvisor"} == 0
        for: 10s
        labels:
          severity: critical
          service: cadvisor
        annotations:
          summary: cAdvisor is down
          description: Prometheus cannot scrape cAdvisor for container metrics for more than 10 seconds.
